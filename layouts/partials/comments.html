<div id="giscus-container"></div>
<script>
        (() => {
                const getGiscusTheme = () => {
                        return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
                };

                const loadGiscus = () => {
                        if (document.querySelector("script[data-giscus-script]")) {
                                return;
                        }

                        const script = document.createElement("script");
                        script.src = "https://giscus.app/client.js";
                        script.async = true;
                        script.crossOrigin = "anonymous";
                        script.setAttribute("data-giscus-script", "true");
                        script.setAttribute("data-repo", "dunkinnear/dunkinnear.github.io");
                        script.setAttribute("data-repo-id", "R_kgDOSGBlvQ");
                        script.setAttribute("data-category", "Announcements");
                        script.setAttribute("data-category-id", "DIC_kwDOSGBlvc4C7LWw");
                        script.setAttribute("data-mapping", "pathname");
                        script.setAttribute("data-strict", "0");
                        script.setAttribute("data-reactions-enabled", "1");
                        script.setAttribute("data-emit-metadata", "0");
                        script.setAttribute("data-input-position", "bottom");
                        script.setAttribute("data-theme", getGiscusTheme());
                        script.setAttribute("data-lang", "en");

                        document.getElementById("giscus-container").appendChild(script);
                };

                const updateGiscusTheme = () => {
                        const iframe = document.querySelector("iframe.giscus-frame");
                        if (!iframe) {
                                return;
                        }

                        iframe.contentWindow.postMessage(
                                {
                                        giscus: {
                                                setConfig: {
                                                        theme: getGiscusTheme()
                                                }
                                        }
                                },
                                "https://giscus.app"
                        );
                };

                loadGiscus();

                new MutationObserver((mutations) => {
                        if (mutations.some((mutation) => mutation.attributeName === "data-theme")) {
                                updateGiscusTheme();
                        }
                }).observe(document.documentElement, {
                        attributes: true,
                        attributeFilter: ["data-theme"]
                });
        })();
</script>
